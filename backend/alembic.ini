# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = backend/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, direct, space-separated, to include
# in the sys.path search path.
prepend_syspath = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to allow for "slug" in the generated filename
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported that are relative to the
# main script_location
# sourceless = false

# version location specification; This defaults
# to backend/migrations/versions.  When using multiple version
# directories, paths must be separated by colons.
# version_locations = %(here)s/bar:%(here)s/bat:backend/migrations/versions

# version_path_separator = :

# set to 'true' to search for scripts recursively
# recursive_version_locations = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = postgresql://postgres:postgres_chd_secure_pwd@localhost:5432/chd_cdss


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for details.

# logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
