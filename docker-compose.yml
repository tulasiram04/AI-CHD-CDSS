version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: chd_db
    restart: always
    env_file:
      - .env.production
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=prod_chd_clinical_secure_db_pass_2026
      - POSTGRES_DB=chd_cdss
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_backups:/backups
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chd_cdss"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chd_network

  redis:
    image: redis:7-alpine
    container_name: chd_redis
    restart: always
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chd_network

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: chd_mlflow
    restart: always
    volumes:
      - mlflow_data:/app/mlruns
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - chd_network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: chd_backend
    restart: always
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - chd_network

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: chd_celery_worker
    command: celery -A backend.tasks.celery_app worker --loglevel=info
    restart: always
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    networks:
      - chd_network

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: chd_celery_beat
    command: celery -A backend.tasks.celery_app beat --loglevel=info
    restart: always
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - chd_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: chd_frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - chd_network

  nginx:
    image: nginx:alpine
    container_name: chd_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - chd_network

  prometheus:
    image: prom/prometheus:latest
    container_name: chd_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chd_network

  grafana:
    image: grafana/grafana:latest
    container_name: chd_grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./docker/grafana_datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - chd_network

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
  db_backups:

networks:
  chd_network:
    name: chd_network
    driver: bridge
